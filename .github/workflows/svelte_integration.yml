name: Run_Svelte_Integration_on_PRs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]


  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run end-to-end tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: pnpm-setup
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Install playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps
      - name: Run tests
        env:
          ENVIRONMENT: test
          WALLABAG_CLIENT_ID: test-client-id
          WALLABAG_CLIENT_SECRET: test-client-secret
          WALLABAG_USERNAME: test-user
          WALLABAG_PASSWORD: test-password
          WALLABAG_URL: https://wallabag.test
          BANDCAMP_USERNAME: test-user
          PUBLIC_SITE_URL: https://example.test
          PUBLIC_URL: https://localhost:5173
          PUBLIC_SENTRY_URL: https://sentry.test
          PUBLIC_UMAMI_URL: https://umami.test/script.js
          PUBLIC_UMAMI_ID: test-umami-id
          USE_REDIS_CACHE: 'false'
          SENTRY_AUTH_TOKEN: test-sentry-token
          SENTRY_BACKEND_URL: https://sentry-backend.test
        run: pnpm test:integration
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
