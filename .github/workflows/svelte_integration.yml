name: Run_Svelte_Integration_on_PRs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]


  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run end-to-end tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: pnpm-setup
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Install playwright browsers
        run: pnpm exec playwright install --with-deps # NOSONAR - playwright install downloads browser binaries via Playwright CLI, not npm packages; --ignore-scripts is not applicable to pnpm exec
      - name: Run tests
        env:
          ENVIRONMENT: test
          WALLABAG_CLIENT_ID: test-client-id
          WALLABAG_CLIENT_SECRET: test-client-secret
          WALLABAG_USERNAME: test-user
          WALLABAG_PASSWORD: test-password
          WALLABAG_URL: https://wallabag.test
          BANDCAMP_USERNAME: test-user
          PUBLIC_SITE_URL: https://example.test
          PUBLIC_URL: http://localhost:5173
          PUBLIC_SENTRY_URL: https://sentry.test
          PUBLIC_UMAMI_URL: https://umami.test/script.js
          PUBLIC_UMAMI_ID: test-umami-id
          USE_REDIS_CACHE: 'false'
          SENTRY_AUTH_TOKEN: test-sentry-token
          SENTRY_BACKEND_URL: https://sentry-backend.test
        run: pnpm test:integration
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
