name: Fallow Analysis

on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master, development]

  workflow_dispatch:

jobs:
  fallow:
    name: Dead code, duplication & complexity
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: fallow-rs/fallow@v2
        with:
          format: sarif
          comment: true
          auto-changed-since: true
          fail-on-issues: false
          production: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: fallow-results.sarif

  badge:
    name: Publish health badge
    runs-on: ubuntu-latest
    needs: fallow
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate health badge
        run: |
          mkdir -p badge-output
          npx --ignore-scripts fallow@2.63.0 health --format badge > badge-output/badge.svg
      - name: Publish badge
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: badge-output
          publish_branch: badges
          keep_files: true
